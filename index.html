<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Market</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quaggaJS/0.12.1/quagga.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="scanner-container"></div>
    <div id="cart"></div>
    <div id="total"></div>
    <script>
        // JavaScript logic for barcode scanning
        // Initialize Quagga.js scanner
        Quagga.init({
            inputStream : {
                name : "LiveStream",
                type : "LiveStream",
                target: document.querySelector('#scanner-container') // the HTML element to use for the video
            },
            decoder : {
                readers : ["code_128_reader"] // list of active readers
            }
        }, function(err) {
            if (err) {
                console.log(err);
                return;
            }
            console.log("Initialization finished. Ready to start" );
            Quagga.start();
        });

        // Additional cart system and total calculation logic
        // ...

    </script>
</body>
</html>
