<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barcode Scanner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quaggaJS/0.12.1/quagga.min.js"></script>
    <style>
        /* Add your CSS styling here */
    </style>
</head>
<body>
    <h1>Barcode Scanner</h1>
    <div id="scanner-container"></div>
    <script>
        // Initialize the barcode scanner
        Quagga.init({
            inputStream : {
                name : "Live",
                type : "LiveStream",
                target: document.querySelector('#scanner-container'), // Or '#yourElement' (optional)
            },
            decoder : {
                readers : ["code_128_reader"] // List of active readers
            }
        }, function(err) {
            if (err) {
                console.error(err);
                return;
            }
            console.log("Initialization finished. Ready to start" );
            Quagga.start();
        });

        // Event listener for detected codes
        Quagga.onDetected(function(data) {
            console.log(data);
            // Handle the detected code here
        });
    </script>
</body>
</html>
