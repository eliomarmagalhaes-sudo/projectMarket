<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Mercado - Diagnóstico</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f0f0f0; text-align: center; }
        #interactive { width: 100%; height: 300px; background: #000; position: relative; }
        #interactive video { width: 100%; height: 100%; object-fit: cover; }
        .btn-start { padding: 20px; background: #28a745; color: white; border: none; border-radius: 8px; font-size: 18px; margin: 20px; cursor: pointer; width: 80%; }
        #log { padding: 15px; color: red; font-size: 14px; background: #fff; margin: 10px; border-radius: 5px; min-height: 50px; }
        .carrinho { padding: 20px; background: white; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="interactive" class="viewport"></div>
    
    <button class="btn-start" id="btnStart" onclick="iniciarScanner()">ATIVAR CÂMARA AGORA</button>

    <div id="log">Aguardando clique no botão...</div>

    <div class="carrinho">
        <h3>Total: <span id="total">R$ 0,00</span></h3>
        <div id="lista"></div>
    </div>

    <script>
        const log = document.getElementById('log');
        let totalCompra = 0;

        async function iniciarScanner() {
            log.innerHTML = "Solicitando permissão...";
            log.style.color = "blue";

            // Verifica se o protocolo é seguro
            if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
                log.innerHTML = "ERRO: A câmara só funciona em sites HTTPS. Se estiver no GitHub, verifique se o link começa por https://";
                log.style.color = "red";
                return;
            }

            Quagga.init({
                inputStream: {
                    name: "Live",
                    type: "LiveStream",
                    target: document.querySelector('#interactive'),
                    constraints: {
                        facingMode: "environment", // Câmara traseira
                        width: 640,
                        height: 480
                    }
                },
                decoder: { readers: ["ean_reader"] }
            }, function(err) {
                if (err) {
                    log.innerHTML = "ERRO DE INICIALIZAÇÃO: " + err.name + " - " + err.message;
                    log.style.color = "red";
                    console.error(err);
                    return;
                }
                log.innerHTML = "Câmara ativa! Aponte para o código.";
                log.style.color = "green";
                document.getElementById('btnStart').style.display = 'none';
                Quagga.start();
            });
        }

        Quagga.onDetected((data) => {
            const code = data.codeResult.code;
            totalCompra += 5.50; // Preço fixo para teste
            document.getElementById('total').innerText = "R$ " + totalCompra.toFixed(2);
            document.getElementById('lista').innerHTML += `<div>Item: ${code} - R$ 5,50</div>`;
            
            // Pausa curta para não ler duplicado
            Quagga.stop();
            setTimeout(() => Quagga.start(), 2000);
        });
    </script>
</body>
</html>
