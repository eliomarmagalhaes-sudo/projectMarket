<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Mercado Web</title>
    <script src="https://cdnjs.cloudflare.com"></script>
    <style>
        * { box-sizing: border-box; font-family: sans-serif; margin: 0; padding: 0; }
        body { background: #f0f2f5; display: flex; flex-direction: column; height: 100vh; }
        
        /* Área do Scanner */
        #scanner-container { width: 100%; height: 40vh; background: #000; position: relative; overflow: hidden; }
        #scanner-container video { width: 100%; height: 100%; object-fit: cover; }
        canvas.drawingBuffer { position: absolute; top: 0; left: 0; }

        /* Lista de Compras */
        .container { flex: 1; padding: 20px; display: flex; flex-direction: column; overflow: hidden; }
        h2 { margin-bottom: 15px; color: #333; }
        #lista-compras { flex: 1; overflow-y: auto; background: #fff; border-radius: 8px; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
        .item-info { flex: 1; }
        .qtd-controls { display: flex; align-items: center; gap: 10px; }
        button.qtd-btn { padding: 5px 10px; border: none; background: #007bff; color: white; border-radius: 4px; cursor: pointer; }
        
        /* Rodapé com Total */
        .total-container { padding: 20px; background: #fff; border-top: 2px solid #007bff; text-align: right; }
        .total-valor { fontSize: 24px; font-weight: bold; color: #007bff; }
    </style>
</head>
<body>

    <div id="scanner-container"></div>

    <div class="container">
        <h2>Carrinho</h2>
        <div id="lista-compras">
            <!-- Itens aparecerão aqui -->
        </div>
    </div>

    <div class="total-container">
        <span>Total da Compra:</span>
        <div class="total-valor" id="valor-total">R$ 0,00</div>
    </div>

    <script>
        let carrinho = [];
        const produtosDB = {
            "7891000000000": { nome: "Exemplo Arroz", preco: 5.50 },
            "5000159459677": { nome: "Coca-Cola 2L", preco: 9.90 }
        };

        // Iniciar o Scanner
        Quagga.init({
            inputStream: { name: "Live", type: "LiveStream", target: document.querySelector('#scanner-container') },
            decoder: { readers: ["ean_reader", "ean_8_reader"] }
        }, function(err) {
            if (err) return console.error(err);
            Quagga.start();
        });

        // Quando um código é detectado
        Quagga.onDetected((data) => {
            const code = data.codeResult.code;
            const produto = produtosDB[code] || { nome: `Produto (${code})`, preco: 2.00 }; // Preço padrão se não estiver na DB
            
            adicionarAoCarrinho(code, produto);
            
            // Pausa breve para não ler o mesmo código 50 vezes por segundo
            Quagga.stop();
            setTimeout(() => Quagga.start(), 2000);
        });

        function adicionarAoCarrinho(id, produto) {
            const index = carrinho.findIndex(i => i.id === id);
            if (index > -1) {
                carrinho[index].qtd++;
            } else {
                carrinho.push({ ...produto, id, qtd: 1 });
            }
            renderizar();
        }

        function alterarQtd(id, delta) {
            const index = carrinho.findIndex(i => i.id === id);
            carrinho[index].qtd += delta;
            if (carrinho[index].qtd <= 0) carrinho.splice(index, 1);
            renderizar();
        }

        function renderizar() {
            const lista = document.getElementById('lista-compras');
            lista.innerHTML = '';
            let total = 0;

            carrinho.forEach(item => {
                total += item.preco * item.qtd;
                lista.innerHTML += `
                    <div class="item">
                        <div class="item-info">
                            <strong>${item.nome}</strong><br>
                            R$ ${item.preco.toFixed(2)}
                        </div>
                        <div class="qtd-controls">
                            <button class="qtd-btn" onclick="alterarQtd('${item.id}', -1)">-</button>
                            <span>${item.qtd}</span>
                            <button class="qtd-btn" onclick="alterarQtd('${item.id}', 1)">+</button>
                        </div>
                    </div>
                `;
            });

            document.getElementById('valor-total').innerText = `R$ ${total.toFixed(2)}`;
        }
    </script>
</body>
</html>
