<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Mercado Pro</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #f0f2f5; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Área do Scanner */
        #scanner-container { width: 100%; height: 40vh; background: #000; position: relative; }
        #scanner-container video { width: 100%; height: 100%; object-fit: cover; }
        canvas { display: none; }

        /* Botão de Ativação Central */
        #btn-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); color: white; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; 
            z-index: 100; cursor: pointer; text-align: center; padding: 20px;
        }

        .carrinho { flex: 1; padding: 20px; background: white; border-radius: 20px 20px 0 0; margin-top: -20px; z-index: 10; overflow-y: auto; }
        .footer { padding: 20px; background: #222; color: #28a745; display: flex; justify-content: space-between; align-items: center; font-size: 24px; font-weight: bold; }
        .btn-limpar { background: #ff4444; color: white; border: none; padding: 10px; border-radius: 5px; margin-bottom: 10px; width: 100%; }
    </style>
</head>
<body>

    <div id="scanner-container">
        <div id="btn-overlay" onclick="iniciarApp()">
            <span style="font-size: 40px;">📷</span>
            <p>Clique aqui para permitir a câmara</p>
            <small style="margin-top:10px; opacity:0.7;">(Necessário HTTPS)</small>
        </div>
    </div>

    <div class="carrinho">
        <button class="btn-limpar" onclick="limpar()">Limpar Carrinho</button>
        <div id="status" style="color: #666; margin-bottom: 10px; font-weight: bold; text-align: center;">Aguardando ativação...</div>
        <div id="lista"></div>
    </div>

    <div class="footer">
        <span>TOTAL:</span>
        <span id="total">R$ 0,00</span>
    </div>

    <script>
        let carrinho = {};
        let processando = false;

        async function iniciarApp() {
            const overlay = document.getElementById('btn-overlay');
            const status = document.getElementById('status');

            try {
                // 1. Esconder botão e avisar
                overlay.style.display = 'none';
                status.innerText = "Solicitando acesso...";

                // 2. Configuração do Quagga
                Quagga.init({
                    inputStream: {
                        name: "Live",
                        type: "LiveStream",
                        target: document.querySelector('#scanner-container'),
                        constraints: {
                            facingMode: "environment", // Força câmara traseira
                            aspectRatio: { min: 1, max: 2 }
                        }
                    },
                    decoder: { readers: ["ean_reader", "code_128_reader"] },
                    locate: true
                }, function(err) {
                    if (err) {
                        status.innerText = "Erro: " + err.name;
                        overlay.style.display = 'flex'; // Mostra botão de novo se falhar
                        console.error(err);
                        return;
                    }
                    
                    // Ajuste crítico para iPhone/Safari
                    const video = document.querySelector('video');
                    if (video) {
                        video.setAttribute('playsinline', 'true');
                        video.setAttribute('muted', 'true');
                    }

                    Quagga.start();
                    status.innerText = "✅ Scanner Ativo! Aponte para um produto.";
                });

            } catch (e) {
                alert("Falha crítica: " + e);
            }
        }

        Quagga.onDetected((result) => {
            const code = result.codeResult.code;
            if (!code || processando) return;

            processando = true;
            
            // Lógica de Carrinho
            if (carrinho[code]) {
                carrinho[code].qtd++;
            } else {
                carrinho[code] = { nome: "Produto " + code.slice(-4), preco: 5.90, qtd: 1 };
            }

            render();

            // Intervalo para o próximo scan (evita duplicados)
            setTimeout(() => { processando = false; }, 2000);
        });

        function render() {
            const listaDiv = document.getElementById('lista');
            listaDiv.innerHTML = '';
            let total = 0;
            Object.values(carrinho).forEach(item => {
                total += item.preco * item.qtd;
                listaDiv.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee;">
                    <span>${item.nome} (x${item.qtd})</span>
                    <strong>R$ ${(item.preco * item.qtd).toFixed(2)}</strong>
                </div>`;
            });
            document.getElementById('total').innerText = `R$ ${total.toFixed(2)}`;
        }

        function limpar() {
            carrinho = {};
            render();
            document.getElementById('status').innerText = "Carrinho limpo.";
        }
    </script>
</body>
</html>
