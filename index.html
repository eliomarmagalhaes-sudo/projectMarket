<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner de Mercado Pro</title>
    <!-- Importação da versão estável Quagga2 via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #f4f7f9; color: #333; display: flex; flex-direction: column; height: 100vh; }
        
        /* Área da Câmara Responsiva */
        #interactive.viewport { width: 100%; height: 300px; background: #000; position: relative; overflow: hidden; }
        #interactive.viewport video, canvas { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        
        .overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 70%; height: 40%; border: 2px solid #00ff00; border-radius: 8px; box-shadow: 0 0 0 1000px rgba(0,0,0,0.5); pointer-events: none; z-index: 10; }

        /* Interface de Carrinho */
        .app-content { flex: 1; padding: 15px; display: flex; flex-direction: column; overflow: hidden; }
        .card { background: #fff; border-radius: 12px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); flex: 1; display: flex; flex-direction: column; }
        .list-items { flex: 1; overflow-y: auto; margin-top: 10px; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        
        .total-box { background: #007bff; color: white; padding: 20px; border-radius: 0 0 20px 20px; display: flex; justify-content: space-between; align-items: center; }
        .total-label { font-size: 14px; opacity: 0.9; }
        .total-price { font-size: 24px; font-weight: bold; }
        
        .status { text-align: center; font-size: 12px; color: #666; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="interactive" class="viewport">
        <div class="overlay"></div>
    </div>

    <div class="app-content">
        <div class="card">
            <h3>🛒 Carrinho</h3>
            <p id="status" class="status">Aguardando leitura...</p>
            <div id="lista" class="list-items">
                <!-- Itens aqui -->
            </div>
        </div>
    </div>

    <div class="total-box">
        <span class="total-label">TOTAL DA COMPRA</span>
        <span class="total-price" id="total-geral">R$ 0,00</span>
    </div>

    <script>
        let carrinho = {};
        const produtosDB = {
            "7891000100103": { nome: "Produto Teste 1", preco: 4.50 },
            "5000159459677": { nome: "Coca-Cola 2L", preco: 9.90 }
        };

        function initScanner() {
            Quagga.init({
                inputStream: {
                    name: "Live",
                    type: "LiveStream",
                    target: document.querySelector('#interactive'),
                    constraints: {
                        facingMode: "environment", // Força a câmara traseira
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                },
                decoder: {
                    readers: ["ean_reader", "upc_reader", "code_128_reader"] // Formatos comuns de mercado
                },
                locate: true
            }, (err) => {
                if (err) {
                    document.getElementById('status').innerText = "Erro ao abrir câmara: " + err;
                    return;
                }
                Quagga.start();
            });
        }

        Quagga.onDetected((result) => {
            const code = result.codeResult.code;
            if (!code) return;

            // Feedback visual de leitura
            document.getElementById('status').innerText = "Último lido: " + code;
            
            const produto = produtosDB[code] || { nome: "Produto " + code, preco: 1.99 };
            
            if (carrinho[code]) {
                carrinho[code].qtd += 1;
            } else {
                carrinho[code] = { ...produto, qtd: 1 };
            }

            renderCarrinho();
            
            // Pausa de 2 segundos para evitar múltiplas leituras do mesmo objeto
            Quagga.stop();
            setTimeout(() => Quagga.start(), 2000);
        });

        function renderCarrinho() {
            const listaDiv = document.getElementById('lista');
            listaDiv.innerHTML = '';
            let total = 0;

            Object.keys(carrinho).forEach(id => {
                const item = carrinho[id];
                total += item.preco * item.qtd;
                listaDiv.innerHTML += `
                    <div class="item-row">
                        <div>
                            <strong>${item.nome}</strong><br>
                            <small>R$ ${item.preco.toFixed(2)} x ${item.qtd}</small>
                        </div>
                        <strong>R$ ${(item.preco * item.qtd).toFixed(2)}</strong>
                    </div>
                `;
            });

            document.getElementById('total-geral').innerText = `R$ ${total.toFixed(2)}`;
        }

        // Iniciar ao carregar
        window.onload = initScanner;
    </script>
</body>
</html>
